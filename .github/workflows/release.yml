name: Release

# Собирает статические бинари deploystack-<os>-<arch> и прикладывает их к
# GitHub Release. Именно эти ассеты скачивает install.sh:
#   $REPO/releases/latest/download/deploystack-linux-amd64
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # ручной запуск без тега (соберёт артефакты, но не релиз)

permissions:
  contents: write # нужно для создания релиза и загрузки ассетов

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Сборка статического бинаря
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="deploystack-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/deploystack
          sha256sum "$out" > "$out.sha256"

      - name: Загрузка артефакта сборки
        uses: actions/upload-artifact@v4
        with:
          name: deploystack-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            deploystack-${{ matrix.goos }}-${{ matrix.goarch }}
            deploystack-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Прикрепить к релизу (только на теге v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deploystack-${{ matrix.goos }}-${{ matrix.goarch }}
            deploystack-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
